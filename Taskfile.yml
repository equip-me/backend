version: "3"

tasks:
  # ── Setup ──────────────────────────────────────────────
  setup:
    desc: Install dependencies
    cmds:
      - poetry install

  # ── Dev ────────────────────────────────────────────────
  dev:
    desc: Start dev server + media worker (Ctrl+C stops both)
    deps: [infra:up]
    cmds:
      - bash -c 'poetry run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000 & p1=$!; poetry run python -m app.worker & p2=$!; trap "kill $p1 $p2 2>/dev/null" INT TERM; wait; wait'

  # ── Infrastructure (internal start, public stop) ──────
  infra:up:
    cmds:
      - docker compose -p rental-dev -f docker-compose.yml up -d

  infra:down:
    desc: Stop dev infrastructure
    cmds:
      - docker compose -p rental-dev -f docker-compose.yml down

  test:infra:
    cmds:
      - docker compose -p rental-test -f docker-compose.test.yml up -d

  test:down:
    desc: Stop test infrastructure
    cmds:
      - docker compose -p rental-test -f docker-compose.test.yml down

  # ── Lint & Format ──────────────────────────────────────
  ruff:
    desc: Check linting (no auto-fix)
    cmds:
      - poetry run ruff check . {{.CLI_ARGS}}
      - poetry run ruff format --check . {{.CLI_ARGS}}

  ruff:fix:
    desc: Auto-fix lint errors and format
    cmds:
      - poetry run ruff check --fix . {{.CLI_ARGS}}
      - poetry run ruff format . {{.CLI_ARGS}}

  # ── Type checking ──────────────────────────────────────
  mypy:
    desc: Run mypy strict
    cmds:
      - poetry run mypy . {{.CLI_ARGS}}

  # ── Testing ────────────────────────────────────────────
  test:
    desc: Run full test suite
    deps: [test:infra]
    cmds:
      - poetry run pytest {{.CLI_ARGS}}

  test:cov:
    desc: Run tests with coverage report
    deps: [test:infra]
    cmds:
      - poetry run pytest --cov=app --cov-report=term {{.CLI_ARGS}}

  test:lf:
    desc: Re-run last failed tests
    deps: [test:infra]
    cmds:
      - poetry run pytest --lf {{.CLI_ARGS}}

  # ── Database migrations ────────────────────────────────
  db:makemigrations:
    desc: Detect model changes and generate migrations
    cmds:
      - poetry run tortoise makemigrations {{.CLI_ARGS}}

  db:migrate:
    desc: Apply pending migrations
    cmds:
      - poetry run tortoise migrate {{.CLI_ARGS}}

  # ── CI (all checks) ───────────────────────────────────
  ci:
    desc: Run all checks (ruff + mypy + test)
    cmds:
      - task: ruff
      - task: mypy
      - task: test

  # ── Production deployment ─────────────────────────────
  prod:setup:
    desc: Provision a fresh VM with the production stack
    cmds:
      - ./deploy/setup.sh

  prod:deploy:
    desc: "Deploy new version (usage: task prod:deploy -- --app 0.5.0 --frontend 1.0.0)"
    cmds:
      - ./deploy/deploy.sh {{.CLI_ARGS}}
