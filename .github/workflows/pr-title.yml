name: pr-title

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            docs
            test
            chore
            ci
            perf
          subjectPatternError: >
            PR title must match: type(scope): description or type: description.
            Max 72 characters. Example: "feat(auth): add JWT refresh tokens"
          subjectPattern: ^.{1,64}$
