name: mypy

on:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Poetry
        run: pipx install poetry
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: mypy
        run: poetry run mypy .
