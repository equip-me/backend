services:
  db:
    image: postgres:17.5
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:26.3.1
    mem_limit: 2g
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password ${CLICKHOUSE_PASSWORD:-clickhouse} --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./config/otel-collector-prod.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    depends_on:
      clickhouse:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.4.2
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - clickhouse

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data

  redis:
    image: redis:7.2.4-alpine
    volumes:
      - redis_data:/data

  app:
    image: ghcr.io/khamitovdr/rental-platform:${APP_VERSION}
    environment:
      APP_ENV: prod
      DATABASE__HOST: db
      DATABASE__PORT: "5432"
      DATABASE__USER: ${POSTGRES_USER}
      DATABASE__PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE__NAME: ${POSTGRES_DB}
      JWT__SECRET: ${JWT_SECRET}
      DADATA_API_KEY: ${DADATA_API_KEY:-}
      OBSERVABILITY__OTLP_ENDPOINT: otel-collector:4317
      STORAGE__ENDPOINT_URL: http://minio:9000
      STORAGE__ACCESS_KEY: ${MINIO_ROOT_USER}
      STORAGE__SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      WORKER__REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      otel-collector:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000

  worker:
    image: ghcr.io/khamitovdr/rental-platform:${APP_VERSION}
    environment:
      APP_ENV: prod
      DATABASE__HOST: db
      DATABASE__PORT: "5432"
      DATABASE__USER: ${POSTGRES_USER}
      DATABASE__PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE__NAME: ${POSTGRES_DB}
      STORAGE__ENDPOINT_URL: http://minio:9000
      STORAGE__ACCESS_KEY: ${MINIO_ROOT_USER}
      STORAGE__SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      WORKER__REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
    command: python -m app.media.worker

  migrate:
    image: ghcr.io/khamitovdr/rental-platform:${APP_VERSION}
    environment:
      APP_ENV: prod
      DATABASE__HOST: db
      DATABASE__PORT: "5432"
      DATABASE__USER: ${POSTGRES_USER}
      DATABASE__PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE__NAME: ${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    command: tortoise migrate
    restart: "no"
    profiles:
      - migrate

volumes:
  pgdata:
  clickhouse_data:
  minio_data:
  redis_data:
